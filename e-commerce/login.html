<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <link rel="stylesheet"
  href="style.css">

  <!-- FONT AWESOME -->

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<script src="auth.js"></script>
<body>

  <div class="auth-page">

    <div class="auth-container">

      <h1>
        Login
      </h1>

      <input type="email"
      id="loginEmail"
      placeholder="Enter Email">

      <input type="password"
      id="loginPassword"
      placeholder="Enter Password">

      <button id="loginSubmit">

        Login

      </button>

      

    </div>

  </div>

  <script src="auth.js"></script>

</body>

</html>
